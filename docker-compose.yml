services:
  flask-app:
    build:
      context: .
      dockerfile: flask.Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    expose:
      - "5000"
    volumes:
      - translations-data:/docker-flask/translations
    dns:
      - 1.1.1.1
      - 8.8.8.8

  more-flask:
    build:
      context: .
      dockerfile: flask.Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - translations-data:/docker-flask/translations
    dns:
      - 1.1.1.1
      - 8.8.8.8
    profiles:
      - workers

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    image: nginx-latest
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - flask-app
    dns:
      - 1.1.1.1
      - 8.8.8.8

  cloudflared:
    env_file:
      - .env
    build:
      context: .
      dockerfile: cloudflared.Dockerfile
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  translations-data:
